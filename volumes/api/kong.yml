## Open Auth routes
- name: auth-v1-open
  url: http://supabase-auth:9999/verify
  routes:
    - name: auth-v1-open
      strip_path: true
      paths:
        - /auth/v1/verify
  plugins:
    - name: cors
      config:
        origins:
          - http://localhost:3000
          - https://bizcard.simon-gpt.com
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        headers:
          - Accept
          - Accept-Version
          - Content-Length
          - Content-MD5
          - Content-Type
          - Date
          - Authorization
          - X-Client-Info
        credentials: true
        max_age: 3600
        preflight_continue: false

