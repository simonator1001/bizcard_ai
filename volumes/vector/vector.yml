api:
  enabled: true
  address: 0.0.0.0:9001
  playground: false

sources:
  docker_logs:
    type: docker_logs
    docker_host: unix:///var/run/docker.sock

transforms:
  add_source_name:
    type: remap
    inputs:
      - docker_logs
    source: |
      . = merge(., {
        "source_name": "docker",
        "source_type": "docker_logs"
      })

sinks:
  console:
    type: console
    inputs:
      - add_source_name
    encoding:
      codec: json

